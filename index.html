<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Digital Universe</title>
<meta name="description" content="An interactive 3D portfolio: navigate a universe of worlds for About, Projects, Skills, Experience, Certifications and Contact." />

<!-- Type system: Chakra Petch (technical display), Space Grotesk (body), Space Mono (HUD/data) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  /* ====================================================================
     DESIGN TOKENS
     Palette: deep-space indigo base, with a distinct neon hue per world.
     --------------------------------------------------------------------
     base   #05060f / #0a0e26   ink #e9ecff   muted #8a90c0
     about  cyan    #38e1ff
     projects violet #a06bff
     skills magenta #ff5cc8
     experience amber #ffb24a
     certs  mint    #46f0b0
     contact coral  #ff6b6b
     ==================================================================== */
  :root{
    --bg0:#05060f; --bg1:#0a0e26; --bg2:#11163a;
    --ink:#e9ecff; --muted:#8a90c0; --line:rgba(150,160,220,.16);
    --glass:rgba(18,22,52,.55); --glass-brd:rgba(150,170,255,.18);
    --c-about:#38e1ff; --c-projects:#a06bff; --c-skills:#ff5cc8;
    --c-experience:#ffb24a; --c-certs:#46f0b0; --c-contact:#ff6b6b;
    --accent:var(--c-about);
    --shadow:0 30px 80px -20px rgba(0,0,0,.8);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 120% at 50% -10%, var(--bg2) 0%, var(--bg1) 38%, var(--bg0) 100%);
    color:var(--ink);
    font-family:'Space Grotesk',system-ui,sans-serif;
    overflow:hidden;
    cursor:none;
    -webkit-font-smoothing:antialiased;
    transition:background 1.2s ease;
  }
  body.is-touch,body.is-touch *{cursor:auto}
  body.day{
    background:
      radial-gradient(120% 120% at 50% -10%, #cfe0ff 0%, #9bb6ef 42%, #5b73b8 100%);
    --ink:#0a1030; --muted:#33407a;
    --glass:rgba(255,255,255,.5); --glass-brd:rgba(40,60,140,.22);
    --line:rgba(30,50,120,.2);
  }
  canvas{position:fixed;inset:0;display:block}

  /* ---------- Loader ---------- */
  #loader{position:fixed;inset:0;z-index:90;display:grid;place-items:center;
    background:radial-gradient(120% 120% at 50% 40%, #0a0e26 0%, #05060f 75%);transition:opacity .9s ease;}
  #loader.hide{opacity:0;pointer-events:none}
  .loadwrap{text-align:center;width:min(440px,84vw)}
  .loadwrap .tag{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.36em;
    text-transform:uppercase;color:var(--c-about);opacity:.85}
  .loadwrap h1{font-family:'Chakra Petch';font-weight:700;font-size:clamp(24px,6.5vw,40px);
    letter-spacing:.02em;margin:10px 0 16px;line-height:1.05}
  .loadwrap h1 span{color:var(--c-about);text-shadow:0 0 24px rgba(56,225,255,.6)}
  .orbit-loader{position:relative;width:96px;height:96px;margin:0 auto 26px}
  .ol-core{position:absolute;inset:50% auto auto 50%;width:16px;height:16px;border-radius:50%;
    transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 35%,#bff4ff,var(--c-about));
    box-shadow:0 0 26px var(--c-about),0 0 60px rgba(56,225,255,.5);animation:pulseCore 2s ease-in-out infinite}
  @keyframes pulseCore{50%{transform:translate(-50%,-50%) scale(1.25)}}
  .ol-ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(150,170,255,.18)}
  .ol-ring i{position:absolute;top:-3px;left:50%;width:7px;height:7px;border-radius:50%;
    margin-left:-3px;box-shadow:0 0 12px currentColor;background:currentColor}
  .ol-ring.r1{animation:spin 2.4s linear infinite;color:var(--c-skills)}
  .ol-ring.r2{inset:18px;animation:spin 1.6s linear infinite reverse;color:var(--c-certs)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .boot{font-family:'Space Mono';font-size:11px;color:var(--muted);letter-spacing:.05em;
    min-height:18px;margin-bottom:18px}
  .boot b{color:var(--c-certs)}
  .bar{height:2px;width:100%;background:rgba(150,160,220,.15);overflow:hidden;border-radius:2px}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--c-about),var(--c-skills));
    box-shadow:0 0 18px var(--c-about);transition:width .2s ease}
  .pct{font-family:'Space Mono';font-size:11px;color:var(--muted);margin-top:12px;letter-spacing:.3em}

  /* ---------- Custom cursor ---------- */
  .cursor-dot,.cursor-ring{position:fixed;top:0;left:0;z-index:80;pointer-events:none;
    border-radius:50%;mix-blend-mode:screen;will-change:transform}
  .cursor-dot{width:6px;height:6px;background:var(--accent);
    box-shadow:0 0 10px var(--accent);transform:translate(-50%,-50%)}
  .cursor-ring{width:34px;height:34px;border:1px solid var(--accent);opacity:.6;
    transform:translate(-50%,-50%);transition:width .25s,height .25s,opacity .25s,border-color .25s}
  .cursor-ring.hot{width:58px;height:58px;opacity:1;border-color:#fff;
    box-shadow:0 0 24px var(--accent)}
  .ripple{position:fixed;z-index:79;pointer-events:none;border-radius:50%;
    border:1px solid var(--accent);transform:translate(-50%,-50%);mix-blend-mode:screen}

  /* ---------- HUD ---------- */
  .hud{position:fixed;z-index:40;pointer-events:none;font-family:'Space Mono',monospace}
  .hud a,.hud button{pointer-events:auto}
  .brand{top:26px;left:30px}
  .brand .mark{display:flex;align-items:center;gap:12px}
  .brand .glyph{width:34px;height:34px;border-radius:9px;border:1px solid var(--glass-brd);
    background:var(--glass);display:grid;place-items:center;backdrop-filter:blur(8px);font-size:13px;
    font-family:'Chakra Petch';font-weight:700;color:var(--accent);box-shadow:0 0 22px -8px var(--accent)}
  .brand .name{font-family:'Chakra Petch';font-weight:700;font-size:16px;letter-spacing:.04em;color:var(--ink)}
  .brand .role{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-top:2px}

  .controls{top:26px;right:30px;display:flex;gap:10px}
  .ctl{width:40px;height:40px;border-radius:11px;border:1px solid var(--glass-brd);
    background:var(--glass);color:var(--ink);backdrop-filter:blur(8px);display:grid;place-items:center;
    font-size:16px;transition:transform .2s,border-color .2s,color .2s;cursor:none}
  body.is-touch .ctl{cursor:pointer}
  .ctl:hover{transform:translateY(-2px);border-color:var(--accent);color:var(--accent)}
  .ctl.on{color:var(--accent);border-color:var(--accent);box-shadow:0 0 18px -6px var(--accent)}

  .console{bottom:24px;left:30px;font-size:10.5px;line-height:1.7;color:var(--muted);letter-spacing:.06em}
  .console b{color:var(--accent);font-weight:700}
  .console .blink{animation:blink 1.1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  .hint{bottom:26px;left:50%;transform:translateX(-50%);text-align:center;
    font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
  .hint.fade{opacity:0;transition:opacity .6s}

  .nav{bottom:74px;right:30px;display:flex;flex-direction:column;gap:14px;align-items:flex-end}
  .nav .dot{display:flex;align-items:center;gap:10px;cursor:none;color:var(--muted);
    font-size:10px;letter-spacing:.18em;text-transform:uppercase;transition:color .2s}
  body.is-touch .nav .dot{cursor:pointer}
  .nav .dot i{width:8px;height:8px;border-radius:50%;background:currentColor;
    box-shadow:0 0 10px currentColor;transition:transform .2s}
  .nav .dot span{opacity:0;transform:translateX(6px);transition:.2s}
  .nav .dot:hover span{opacity:1;transform:none}
  .nav .dot:hover i{transform:scale(1.5)}

  /* ---------- Floating planet labels ---------- */
  .label{position:fixed;z-index:35;pointer-events:none;transform:translate(-50%,-140%);
    opacity:0;transition:opacity .25s}
  .label.show{opacity:1}
  .label .pill{font-family:'Space Mono';font-size:11px;letter-spacing:.24em;text-transform:uppercase;
    padding:7px 14px;border-radius:30px;background:var(--glass);border:1px solid var(--lc,#fff);
    color:var(--lc,#fff);backdrop-filter:blur(8px);white-space:nowrap;
    box-shadow:0 0 24px -6px var(--lc,#fff)}
  .label .sub{display:block;text-align:center;margin-top:6px;font-family:'Space Mono';
    font-size:9px;letter-spacing:.18em;color:var(--muted)}

  /* ---------- Section overlay panels ---------- */
  #panel{position:fixed;inset:0;z-index:50;display:none;pointer-events:none}
  #panel.open{display:block}
  .scrim{position:absolute;inset:0;background:rgba(3,4,12,.35);opacity:0;transition:opacity .5s}
  .open .scrim{opacity:1}
  .sheet{position:absolute;pointer-events:auto;left:50%;top:50%;
    transform:translate(-50%,-46%);width:min(880px,92vw);max-height:84vh;overflow:auto;
    background:var(--glass);border:1px solid var(--glass-brd);border-radius:22px;
    backdrop-filter:blur(22px);box-shadow:var(--shadow);padding:34px 36px;
    opacity:0;transition:opacity .5s,transform .5s;scrollbar-width:thin}
  .open .sheet{opacity:1;transform:translate(-50%,-50%)}
  .sheet::-webkit-scrollbar{width:8px}
  .sheet::-webkit-scrollbar-thumb{background:var(--glass-brd);border-radius:8px}
  .sheet .eyebrow{font-family:'Space Mono';font-size:10px;letter-spacing:.4em;text-transform:uppercase;
    color:var(--accent)}
  .sheet h2{font-family:'Chakra Petch';font-weight:700;font-size:clamp(26px,4vw,40px);
    margin:8px 0 4px;letter-spacing:.01em}
  .sheet .lede{color:var(--muted);font-size:15px;max-width:60ch;margin-bottom:22px}
  .close{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:11px;
    border:1px solid var(--glass-brd);background:rgba(255,255,255,.04);color:var(--ink);
    font-size:18px;display:grid;place-items:center;cursor:none}
  body.is-touch .close{cursor:pointer}
  .close:hover{border-color:var(--accent);color:var(--accent)}

  /* About */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .card{border:1px solid var(--line);border-radius:14px;padding:16px;background:rgba(255,255,255,.03);
    transition:transform .3s,border-color .3s}
  .card:hover{transform:translateY(-4px);border-color:var(--accent)}
  .card .k{font-family:'Space Mono';font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
  .card .v{margin-top:8px;font-size:14px;line-height:1.5}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
  .chip{font-family:'Space Mono';font-size:10px;padding:4px 9px;border-radius:20px;
    border:1px solid var(--line);color:var(--muted)}

  /* Skills */
  .skillgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
  .skill{border:1px solid var(--line);border-radius:13px;padding:14px;background:rgba(255,255,255,.03)}
  .skill .top{display:flex;justify-content:space-between;align-items:baseline}
  .skill .nm{font-family:'Chakra Petch';font-weight:600;font-size:15px}
  .skill .yr{font-family:'Space Mono';font-size:10px;color:var(--muted)}
  .skill .track{height:5px;border-radius:5px;background:rgba(255,255,255,.08);margin-top:10px;overflow:hidden}
  .skill .fill{height:100%;width:0;border-radius:5px;
    background:linear-gradient(90deg,var(--accent),#fff);box-shadow:0 0 12px var(--accent);
    transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .skillgroup{margin-bottom:20px}
  .sg-title{font-family:'Space Mono';font-size:10px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--accent);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

  /* About stats */
  .statrow{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap}
  .statbox{flex:1;min-width:110px;text-align:center;border:1px solid var(--line);border-radius:14px;
    padding:14px 10px;background:rgba(255,255,255,.03)}
  .statbox b{font-family:'Chakra Petch';font-weight:700;font-size:26px;color:var(--accent);display:block;
    text-shadow:0 0 18px var(--accent)}
  .statbox span{font-family:'Space Mono';font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

  /* Experience extras */
  .explist{margin:8px 0 10px;padding:0}
  .explist li{list-style:none;position:relative;padding-left:18px;font-size:13px;color:var(--muted);
    line-height:1.5;margin:5px 0}
  .explist li::before{content:'▹';position:absolute;left:0;color:var(--accent)}
  .livebadge{font-family:'Space Mono';font-size:9px;letter-spacing:.1em;color:var(--c-certs);
    border:1px solid var(--c-certs);border-radius:20px;padding:2px 8px;margin-left:6px;vertical-align:middle}

  /* Projects */
  .proj{border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:14px;
    background:rgba(255,255,255,.03);transition:border-color .3s,transform .3s}
  .proj:hover{border-color:var(--accent);transform:translateY(-3px)}
  .proj h3{font-family:'Chakra Petch';font-weight:700;font-size:20px;display:flex;align-items:center;gap:10px}
  .proj h3 em{font-style:normal;font-family:'Space Mono';font-size:10px;color:var(--accent);
    border:1px solid var(--accent);border-radius:20px;padding:3px 9px;letter-spacing:.1em}
  .proj p{color:var(--muted);font-size:14px;margin:8px 0 12px;line-height:1.55}
  .proj .feat{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
  .proj .feat li{list-style:none;font-size:13px;padding-left:18px;position:relative}
  .proj .feat li::before{content:'▹';position:absolute;left:0;color:var(--accent)}
  .proj .links{display:flex;gap:10px;margin-top:6px}
  .btn{font-family:'Space Mono';font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    padding:9px 16px;border-radius:10px;border:1px solid var(--accent);color:var(--accent);
    background:transparent;text-decoration:none;cursor:none;transition:.2s}
  body.is-touch .btn{cursor:pointer}
  .btn:hover{background:var(--accent);color:#05060f;box-shadow:0 0 22px -4px var(--accent)}
  .btn.ghost{border-color:var(--line);color:var(--muted)}
  .btn.ghost:hover{color:var(--ink);border-color:var(--ink);background:transparent;box-shadow:none}

  /* Experience timeline */
  .tl{position:relative;padding-left:26px}
  .tl::before{content:'';position:absolute;left:6px;top:6px;bottom:6px;width:2px;
    background:linear-gradient(var(--accent),transparent)}
  .tl .node{position:relative;margin-bottom:20px}
  .tl .node::before{content:'';position:absolute;left:-26px;top:4px;width:14px;height:14px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 16px var(--accent);border:3px solid var(--bg1)}
  .tl .when{font-family:'Space Mono';font-size:10px;letter-spacing:.16em;color:var(--accent)}
  .tl .what{font-family:'Chakra Petch';font-weight:600;font-size:17px;margin:3px 0}
  .tl .who{color:var(--muted);font-size:13px}
  .tl .desc{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.5}

  /* Certifications — flip cards */
  .certs{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .flip{perspective:1000px;height:150px}
  .flip .inner{position:relative;width:100%;height:100%;transition:transform .7s;
    transform-style:preserve-3d}
  .flip:hover .inner,.flip.flipped .inner{transform:rotateY(180deg)}
  .flip .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;
    border:1px solid var(--line);padding:16px;display:flex;flex-direction:column;justify-content:space-between}
  .flip .front{background:rgba(255,255,255,.04)}
  .flip .back{transform:rotateY(180deg);background:linear-gradient(150deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
    border-color:var(--accent)}
  .flip .ttl{font-family:'Chakra Petch';font-weight:600;font-size:15px;line-height:1.3}
  .flip .org{font-family:'Space Mono';font-size:10px;color:var(--accent);letter-spacing:.14em}
  .flip .back p{font-size:12px;color:var(--muted);line-height:1.5}

  /* Contact — command console */
  .console-ui{font-family:'Space Mono'}
  .console-ui .line{font-size:12px;color:var(--muted);margin-bottom:6px}
  .console-ui .line b{color:var(--accent)}
  .commgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
  .commgrid .btn{justify-self:stretch;text-align:center}
  .field{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
  .field textarea{flex:1;min-width:240px;min-height:84px;resize:vertical;background:rgba(0,0,0,.25);
    border:1px solid var(--line);border-radius:12px;color:var(--ink);padding:12px;
    font-family:'Space Mono';font-size:13px;outline:none}
  .field textarea:focus{border-color:var(--accent)}
  #sendBtn{align-self:flex-end}
  .sent{margin-top:12px;font-family:'Space Mono';font-size:12px;color:var(--c-certs);opacity:0;transition:.4s}
  .sent.show{opacity:1}

  /* ---------- Achievement toast ---------- */
  #toasts{position:fixed;top:84px;left:50%;transform:translateX(-50%);z-index:60;
    display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
  .toast{display:flex;align-items:center;gap:12px;padding:11px 18px;border-radius:14px;
    background:var(--glass);border:1px solid var(--accent);backdrop-filter:blur(12px);
    box-shadow:0 0 30px -8px var(--accent);transform:translateY(-20px);opacity:0;
    transition:transform .4s cubic-bezier(.2,.9,.2,1),opacity .4s}
  .toast.in{transform:none;opacity:1}
  .toast .ico{font-size:20px}
  .toast .tt{font-family:'Chakra Petch';font-weight:700;font-size:13px}
  .toast .ts{font-family:'Space Mono';font-size:10px;color:var(--muted);letter-spacing:.1em}

  /* ---------- Dev mode overlays ---------- */
  #matrix{position:fixed;inset:0;z-index:30;pointer-events:none;opacity:0;transition:opacity .6s}
  #matrix.on{opacity:.5}
  #fps{position:fixed;top:84px;right:30px;z-index:45;display:none;font-family:'Space Mono';
    font-size:11px;color:var(--c-certs);background:rgba(0,0,0,.5);border:1px solid var(--c-certs);
    border-radius:10px;padding:8px 12px;line-height:1.6}
  #fps.show{display:block}
  #fps b{color:#fff}
  .devbadge{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:45;
    font-family:'Space Mono';font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--c-certs);border:1px solid var(--c-certs);border-radius:30px;padding:6px 16px;
    background:rgba(0,0,0,.4);display:none}
  .devbadge.show{display:block}

  /* ---------- Responsive ---------- */
  canvas{touch-action:none}
  @media (max-width:760px){
    .brand{top:14px;left:14px} .controls{top:14px;right:14px;gap:8px}
    .ctl{width:38px;height:38px;border-radius:10px;font-size:15px}
    .console{display:none}
    .brand .name{font-size:13px;letter-spacing:.02em}
    .brand .role{font-size:8.5px;letter-spacing:.22em}
    .brand .glyph{width:30px;height:30px}

    /* nav becomes a scrollable chip bar pinned to the bottom */
    .nav{flex-direction:row;align-items:center;bottom:14px;top:auto;right:auto;left:0;width:100%;
      gap:8px;padding:0 14px;overflow-x:auto;justify-content:flex-start;
      -webkit-overflow-scrolling:touch;scrollbar-width:none}
    .nav::-webkit-scrollbar{display:none}
    .nav .dot{flex:0 0 auto;flex-direction:row-reverse;gap:7px;padding:8px 13px;border-radius:30px;
      background:var(--glass);border:1px solid var(--glass-brd);backdrop-filter:blur(8px);
      font-size:10px;letter-spacing:.08em}
    .nav .dot span{opacity:1;transform:none}
    .nav .dot i{width:7px;height:7px}

    .hint{bottom:64px;font-size:9px;letter-spacing:.16em;padding:0 16px;line-height:1.5}
    .sheet{padding:24px 18px;width:94vw;max-height:82vh;border-radius:18px}
    .sheet h2{font-size:24px}
    .cards,.skillgrid,.certs,.commgrid{grid-template-columns:1fr}
    .proj .feat{grid-template-columns:1fr}
    .statbox b{font-size:22px}
    #toasts{top:70px;width:92vw}
    .toast{padding:9px 14px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:.01ms!important}
    .ol-core,.ol-ring{animation:none}
  }
</style>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="loadwrap">
      <div class="orbit-loader">
        <div class="ol-core"></div>
        <div class="ol-ring r1"><i></i></div>
        <div class="ol-ring r2"><i></i></div>
      </div>
      <div class="tag">QA Engineer · Test Automation</div>
      <h1 id="loadName">GAYATHMI <span>MOHOTTIGE</span></h1>
      <div class="boot" id="bootLine">› initializing flight systems…</div>
      <div class="bar"><i id="barFill"></i></div>
      <div class="pct" id="pctTxt">0%</div>
    </div>
  </div>

  <!-- Custom cursor -->
  <div class="cursor-ring" id="cRing"></div>

        <div class="name" id="brandName">GAYATHMI MOHOTTIGE</div>

  <!-- Section panel -->

    <div class="scrim" id="scrim"></div>

      <button class="close" id="closeBtn">✕</button>
      <div id="sheetBody"></div>
    </div>
  </div>

  <!-- Toasts / dev overlays -->
  <div id="toasts"></div>
  <canvas id="matrix"></canvas>
  <div id="fps">FPS <b id="fpsVal">--</b><br>obj <b id="objVal">--</b><br>tris <b id="triVal">--</b></div>
  <div class="devbadge" id="devbadge">◈ Developer Mode</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
  (function(){
  'use strict';
  const TAU = Math.PI*2;
  const lerp=(a,b,t)=>a+(b-a)*t;
  const rand=(a,b)=>a+Math.random()*(b-a);
  const isTouch = matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window;
  if(isTouch) document.body.classList.add('is-touch');
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const state = { stars:null, nebula:[], current:null, transition:false };

  /* =====================================================================
     CONTENT  — EDIT these objects to make the universe yours.
     ===================================================================== */
  const NAME = 'Gayathmi Mohottige';
  document.getElementById('brandName').textContent = NAME.toUpperCase();

  const WORLDS = [
    { id:'about', name:'About', sub:'who I am', color:0x38e1ff, pos:[-7.5, 2.2, 1], size:1.6, rings:true },
    { id:'skills', name:'Skills', sub:'my toolkit', color:0xff5cc8, pos:[0.5,-3.4, 4.5], size:1.7, rings:true },
    { id:'experience', name:'Experience', sub:'my journey', color:0xffb24a, pos:[9.2,-2.0, 2.5], size:1.45, rings:false },
    { id:'projects', name:'Projects', sub:'what I build', color:0xa06bff, pos:[6.4, 3.1,-4], size:2.0, rings:true },
    { id:'certs', name:'Certifications', sub:'the proof', color:0x46f0b0, pos:[-8.5,-3.2,-5], size:1.35, rings:false },
    { id:'contact', name:'Contact', sub:'say hello', color:0xff6b6b, pos:[2.5, 5.4,-7.5], size:1.5, rings:true },
  ];
  const HEX = c => '#'+c.toString(16).padStart(6,'0');

  // Proficiency label → bar fill
  const PROF = { 'Expert':0.96, 'Advanced':0.86, 'Proficient':0.76, 'Intermediate':0.62 };
  const SKILLS = [
    { cat:'Automation', items:[ {n:'Playwright',p:'Expert'},{n:'Selenium',p:'Proficient'},{n:'TestNG',p:'Proficient'},{n:'Java',p:'Advanced'} ] },
    { cat:'API & Database', items:[ {n:'Postman',p:'Expert'},{n:'SoapUI',p:'Proficient'},{n:'Oracle SQL Developer',p:'Proficient'},{n:'PostgreSQL',p:'Intermediate'} ] },
    { cat:'Testing Types', items:[ {n:'Smoke Testing',p:'Expert'},{n:'Sanity Testing',p:'Expert'},{n:'Regression Testing',p:'Expert'},{n:'Manual Testing',p:'Expert'} ] },
    { cat:'Development', items:[ {n:'JavaScript',p:'Advanced'},{n:'TypeScript',p:'Intermediate'},{n:'Python',p:'Intermediate'},{n:'React',p:'Intermediate'},{n:'HTML / CSS',p:'Advanced'},{n:'Node.js',p:'Intermediate'} ] },
  ];
  const PROJECTS = [
    { t:'AI Interview Coach', tag:'Full-stack · AI', d:'Simulates technical mock interviews with AI — real-time feedback, retry mechanics and model answers for Java, DSA and SQL.',
      feat:['Real-time AI feedback','Retry mechanics','Model answers: Java · DSA · SQL'],
      stack:['Spring Boot','Next.js','TypeScript','MongoDB','Gemini API'], gh:'https://github.com/Gayathmi-Mohottige/Interview-Coach' },
    { t:'EleEYE System', tag:'AI · IoT', d:'AI elephant detection & alert system that helps prevent vehicle collisions on Sri Lankan roads using real-time location data.',
      feat:['Real-time elephant detection','Collision alerting','Live location tracking'],
      stack:['Node.js','Supabase','TypeScript','Google Maps API'], gh:'https://github.com/pavix0xd/EleEye' },
    { t:'EleEYE Marketing Page', tag:'Web · Live', d:'Responsive marketing site with a dynamic hero, live counter stats, animated feature cards and smooth-scroll UX. Live in production.',
      feat:['Dynamic hero section','Live counter stats','Animated feature cards'],
      stack:['HTML','CSS','JavaScript'], gh:'https://github.com/Gayathmi-Mohottige/EleEYE-landing-page-main', demo:'https://eleye.site' },
    { t:'Ticket Simulation System', tag:'Concurrency', d:'Real-time concurrent ticket simulation with vendor/customer threads, live pool visualisation, transaction logs and start/stop controls.',
      feat:['Concurrent producer/consumer threads','Live pool visualisation','Transaction logs + controls'],
      stack:['Spring Boot','MySQL','React','Chart.js'], gh:'https://github.com/Gayathmi-Mohottige/Ticket-Manager' },
    { t:'Weather App', tag:'Web · API', d:'Real-time weather with 5-day forecasts, dynamic backgrounds that reflect live conditions and graceful error handling.',
      feat:['5-day forecasts','Condition-based backgrounds','Graceful error handling'],
      stack:['HTML','CSS','JavaScript','OpenWeatherMap'], gh:'https://github.com/Gayathmi-Mohottige/weather-app' },
    { t:'University Progression System', tag:'Python', d:'Console app that determines student progression outcomes with histogram visualisation, input validation and file output.',
      feat:['Progression outcome logic','Histogram visualisation','Input validation + file output'],
      stack:['Python'], gh:'https://github.com/Gayathmi-Mohottige/progression-outcome-determination' },
  ];
  const EXPERIENCE = [
    { when:'2025 — Present', what:'QA Engineer Intern', who:'Virtusa · Colombo, Sri Lanka', live:true,
      bullets:[
        'Architected a Playwright E2E automation framework from scratch for 2 enterprise portals',
        'Ran smoke, sanity and full regression cycles across multiple releases',
        'Performed REST & SOAP API testing with Postman and SoapUI',
        'Validated database integrity and data accuracy in Oracle SQL Developer',
        'Documented, reproduced and tracked defects alongside dev teams',
      ],
      tools:['Playwright','Postman','SoapUI','Oracle SQL','Selenium','TestNG'] },
    { when:'2023 — Present', what:'BSc (Hons) Software Engineering', who:'Informatics Institute of Technology (IIT)', desc:'Affiliated with University of Westminster, UK.' },
    { when:'2020 — 2023', what:'G.C.E. Advanced Level — Physical Science', who:'Sri Sumangala Balika Maha Vidyalaya', desc:'Results: 1C 2S' },
    { when:'2014 — 2019', what:'G.C.E. Ordinary Level', who:'Panadura Balika Maha Vidyalaya', desc:'Results: 9A' },
  ];
  const CERTS = [
    { t:'Microsoft Azure Essentials', org:'Great Learning · Jun 2025', d:'Foundations of Azure cloud services and architecture.' },
    { t:'Java (Basic) Certificate', org:'HackerRank · Jun 2025', d:'Verified core Java problem solving.', link:'https://www.hackerrank.com/certificates/9534076271c4' },
    { t:'Postman API Fundamentals — Student Expert', org:'Postman · Jun 2025', d:'REST API testing, collections and automation.', link:'https://badgr.com/backpack/badges/683f2e8c9667760a72ff668c' },
    { t:'React.js Essential Training', org:'LinkedIn Learning · Oct 2024', d:'Building component-driven interfaces.', link:'https://www.linkedin.com/learning/certificates/9d40d4248c0a0b66dd0eff65f80a16e6bdf9af4295650376e92fac9f4347b062' },
    { t:'Java Object-Oriented Programming', org:'LinkedIn Learning · Jul 2024', d:'OOP design and the Java platform.', link:'https://www.linkedin.com/learning/certificates/4458c3e739aff6350fe015cc5955f0d8e8cee8b71ec8cc5786d7e718440d4d57' },
    { t:'JavaScript Essential Training', org:'LinkedIn Learning · Jul 2024', d:'Modern JavaScript fundamentals.', link:'https://www.linkedin.com/learning/certificates/a40bacb58c8e442c1380d2b86b8fab74873efe5f5375baa63375482d85e87a33' },
  ];
  const LINKS = {
    github:'https://github.com/Gayathmi-Mohottige',
    linkedin:'https://www.linkedin.com/in/gayathmi-mohottige-4328b6294',
    email:'mailto:gayathmimohottige@gmail.com',
    resume:'assets/Gayathmi_Mohottige_Resume.pdf'
  };

  /* =====================================================================
     THREE.JS  SCENE
     ===================================================================== */
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x05060f, 0.012);
  const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 400);
  const renderer = new THREE.WebGLRenderer({ antialias:!isTouch, alpha:true, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, isTouch?1.5:2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // ---- procedural textures ----
  function gradTex(stops, size=128){
    const c=document.createElement('canvas'); c.width=c.height=size;
    const g=c.getContext('2d'); const grd=g.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    stops.forEach(s=>grd.addColorStop(s[0],s[1])); g.fillStyle=grd; g.fillRect(0,0,size,size);
    return new THREE.CanvasTexture(c);
  }
  const glowTex = gradTex([[0,'rgba(255,255,255,1)'],[.25,'rgba(255,255,255,.55)'],[1,'rgba(255,255,255,0)']],256);
  const starTex = gradTex([[0,'rgba(255,255,255,1)'],[.4,'rgba(255,255,255,.6)'],[1,'rgba(255,255,255,0)']],64);

  function planetTex(hex){
    const col = new THREE.Color(hex);
    const s=512, c=document.createElement('canvas'); c.width=c.height=s; const g=c.getContext('2d');
    const base=col.clone().multiplyScalar(.32);
    g.fillStyle='rgb('+(base.r*255|0)+','+(base.g*255|0)+','+(base.b*255|0)+')'; g.fillRect(0,0,s,s);
    for(let i=0;i<26;i++){
      const x=Math.random()*s,y=Math.random()*s,r=rand(30,130);
      const t=Math.random(); const cc=col.clone().multiplyScalar(t>.5?rand(.5,.9):rand(.15,.35));
      const grd=g.createRadialGradient(x,y,0,x,y,r);
      grd.addColorStop(0,'rgba('+(cc.r*255|0)+','+(cc.g*255|0)+','+(cc.b*255|0)+',.9)');
      grd.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle=grd;
      g.beginPath(); g.arc(x,y,r,0,TAU); g.fill();
    }
    // bright speckles ("city lights")
    const bright=col.clone().lerp(new THREE.Color(0xffffff),.6);
    g.fillStyle='rgba('+(bright.r*255|0)+','+(bright.g*255|0)+','+(bright.b*255|0)+',.8)';
    for(let i=0;i<140;i++){ g.fillRect(Math.random()*s,Math.random()*s,rand(1,2.4),rand(1,2.4)); }
    const tex=new THREE.CanvasTexture(c); return tex;
  }

  // ---- starfield ----
  const STAR_N = isTouch?2600:6500;
  (function buildStars(){
    const pos=new Float32Array(STAR_N*3), col=new Float32Array(STAR_N*3);
    const palette=[new THREE.Color(0xffffff),new THREE.Color(0x9fd8ff),new THREE.Color(0xffd9a8),new THREE.Color(0xd5b6ff)];
    for(let i=0;i<STAR_N;i++){
      const r=rand(40,180), th=Math.random()*TAU, ph=Math.acos(rand(-1,1));
      pos[i*3]=r*Math.sin(ph)*Math.cos(th); pos[i*3+1]=r*Math.cos(ph)*0.6; pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
      const cc=palette[Math.random()*palette.length|0]; col[i*3]=cc.r; col[i*3+1]=cc.g; col[i*3+2]=cc.b;
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:.7,map:starTex,vertexColors:true,transparent:true,
      depthWrite:false,blending:THREE.AdditiveBlending});
    state.stars=new THREE.Points(geo,mat); scene.add(state.stars);
  })();

  // ---- nebula clouds ----
  (function buildNebula(){
    const colors=[0x4a2d8f,0x1f5fa0,0x8f2d6e,0x2d8f7a];
    for(let i=0;i<6;i++){
      const tex=gradTex([[0,'rgba(255,255,255,.9)'],[.5,'rgba(255,255,255,.3)'],[1,'rgba(255,255,255,0)']],256);
      const m=new THREE.SpriteMaterial({map:tex,color:colors[i%colors.length],transparent:true,
        opacity:.16,depthWrite:false,blending:THREE.AdditiveBlending});
      const sp=new THREE.Sprite(m); const sc=rand(40,90);
      sp.scale.set(sc,sc,1); sp.position.set(rand(-60,60),rand(-30,30),rand(-90,-30));
      sp.userData.spin=rand(-.02,.02); state.nebula.push(sp); scene.add(sp);
    }
  })();

  // ---- planets ----
  const universe = new THREE.Group(); scene.add(universe);
  const pickMeshes=[];
  WORLDS.forEach(w=>{
    const g=new THREE.Group(); g.position.set(...w.pos); g.userData.world=w; g.userData.baseScale=1;
    // core
    const tex=planetTex(w.color);
    const core=new THREE.Mesh(
      new THREE.SphereGeometry(w.size,48,48),
      new THREE.MeshStandardMaterial({map:tex,emissive:new THREE.Color(w.color),emissiveMap:tex,
        emissiveIntensity:.9,roughness:.65,metalness:.15})
    );
    core.userData.world=w; g.add(core); pickMeshes.push(core); w._core=core; w._mat=core.material;
    // atmosphere shell
    const atm=new THREE.Mesh(
      new THREE.SphereGeometry(w.size*1.18,32,32),
      new THREE.MeshBasicMaterial({color:w.color,transparent:true,opacity:.12,side:THREE.BackSide,
        blending:THREE.AdditiveBlending,depthWrite:false})
    ); g.add(atm);
    // glow halo (fake bloom)
    const halo=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:w.color,transparent:true,
      opacity:.85,depthWrite:false,blending:THREE.AdditiveBlending}));
    halo.scale.set(w.size*7,w.size*7,1); g.add(halo); w._halo=halo;
    // orbiting particle ring
    if(w.rings){
      const N=160, p=new Float32Array(N*3), rr=w.size*1.9;
      for(let i=0;i<N;i++){const a=Math.random()*TAU,rad=rr+rand(-.2,.6),h=rand(-.25,.25);
        p[i*3]=Math.cos(a)*rad;p[i*3+1]=h;p[i*3+2]=Math.sin(a)*rad;}
      const rg=new THREE.BufferGeometry(); rg.setAttribute('position',new THREE.BufferAttribute(p,3));
      const ring=new THREE.Points(rg,new THREE.PointsMaterial({size:.12,map:starTex,color:w.color,
        transparent:true,depthWrite:false,blending:THREE.AdditiveBlending}));
      ring.rotation.x=rand(.3,1.1); g.add(ring); g.userData.ring=ring;
    }
    g.userData.bob=Math.random()*TAU;
    universe.add(g); w._group=g;
  });

  // ---- lights ----
  const amb=new THREE.AmbientLight(0x404a80,.9); scene.add(amb);
  const key=new THREE.PointLight(0xffffff,1.1,200); key.position.set(20,30,20); scene.add(key);
  const fill=new THREE.PointLight(0x6a5cff,.7,200); fill.position.set(-30,-10,-20); scene.add(fill);
  const dir=new THREE.DirectionalLight(0xffffff,.25); dir.position.set(0,1,1); scene.add(dir);

  /* =====================================================================
     CAMERA RIG
     ===================================================================== */
  const camBase=new THREE.Vector3(0,6,80);
  const camLook=new THREE.Vector3(0,0,0);
  const parallax=new THREE.Vector3();      // smoothed
  const parallaxTarget=new THREE.Vector3();
  const HOME={pos:new THREE.Vector3(0,3,24),look:new THREE.Vector3(0,0,0)};
  let autoRotate=0;            // target yaw speed
  let dragYaw=0,dragPitch=0,tgtYaw=0,tgtPitch=0;
  let portrait=false;
  function frameCamera(){
    portrait = innerWidth < innerHeight;
    camera.fov = portrait ? 66 : (innerWidth<900?60:55);
    camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
    HOME.pos.set(0, portrait?2:3, portrait?40:(innerWidth<900?28:24));
  }
  frameCamera();
  camera.position.copy(camBase);

  /* =====================================================================
     POINTER + CUSTOM CURSOR
     ===================================================================== */
  const ndc=new THREE.Vector2(-2,-2);       // off-screen until moved
  const ray=new THREE.Raycaster();
  const cDot=document.getElementById('cDot'), cRing=document.getElementById('cRing');
  let mx=innerWidth/2,my=innerHeight/2, rx=mx,ry=my;
  let dragging=false,lastX=0,lastY=0,moved=0;

  function onMove(e){
    const x=e.clientX,y=e.clientY; mx=x; my=y;
    ndc.x=(x/innerWidth)*2-1; ndc.y=-(y/innerHeight)*2+1;
    parallaxTarget.set(ndc.x*2.2, ndc.y*1.6, 0);
    if(dragging && !state.current && !state.transition){ const dx=x-lastX,dy=y-lastY; tgtYaw+=dx*.0035; tgtPitch=Math.max(-.5,Math.min(.5,tgtPitch+dy*.002));
      moved+=Math.abs(dx)+Math.abs(dy); lastX=x; lastY=y; }
    else if(dragging){ moved+=Math.abs(x-lastX)+Math.abs(y-lastY); lastX=x; lastY=y; }
    if(!isTouch){ cDot.style.transform='translate('+(x-3)+'px,'+(y-3)+'px)'; }
  }
  addEventListener('pointermove',onMove,{passive:true});
addEventListener('pointerdown', e => { 
  dragging = true; 
  moved = 0; 
  lastX = e.clientX; 
  lastY = e.clientY; 
  
  // FIX: Instantly update normalized device coordinates (ndc) on tap 
  // so the raycaster knows exactly where your finger just landed.
  ndc.x = (e.clientX / innerWidth) * 2 - 1;
  ndc.y = -(e.clientY / innerHeight) * 2 + 1;
  
  // Force an immediate calculation so 'hovered' is ready before pointerup fires
  if(isTouch) updateHover();
});  addEventListener('pointerup',e=>{ dragging=false; if(moved<6) handleClick(); });

  // cursor ring trail
  function cursorLoop(){ rx=lerp(rx,mx,.18); ry=lerp(ry,my,.18);
    cRing.style.transform='translate('+(rx-17)+'px,'+(ry-17)+'px)'; requestAnimationFrame(cursorLoop); }
  if(!isTouch) cursorLoop();

  // ripple on click
  addEventListener('pointerdown',e=>{
    if(isTouch) return;
    const r=document.createElement('div'); r.className='ripple';
    r.style.left=e.clientX+'px'; r.style.top=e.clientY+'px'; r.style.width=r.style.height='8px';
    document.body.appendChild(r);
    gsap.to(r,{width:90,height:90,opacity:0,duration:.6,ease:'power2.out',onComplete:()=>r.remove()});
  });

  /* =====================================================================
     HOVER + LABELS
     ===================================================================== */
  const label=document.getElementById('label'),labelPill=document.getElementById('labelPill'),
        labelSub=document.getElementById('labelSub');
  let hovered=null;
  function setAccent(color){ document.documentElement.style.setProperty('--accent',HEX(color)); }

  function updateHover(){
    if(state.current||state.transition){ if(hovered) clearHover(); return; }
    ray.setFromCamera(ndc,camera);
    const hits=ray.intersectObjects(pickMeshes,false);
    const w = hits.length? hits[0].object.userData.world : null;
    if(w!==hovered){
      if(hovered) gsap.to(hovered._group.scale,{x:1,y:1,z:1,duration:.4,ease:'power2.out'});
      hovered=w;
      if(w){
        gsap.to(w._group.scale,{x:1.16,y:1.16,z:1.16,duration:.4,ease:'back.out(2)'});
        setAccent(w.color);
        label.style.setProperty('--lc',HEX(w.color));
        labelPill.textContent=w.name; labelSub.textContent=w.sub;
        cRing.classList.add('hot');
      } else { cRing.classList.remove('hot'); }
    }
    if(hovered){
      const v=hovered._group.getWorldPosition(new THREE.Vector3()); v.y+=hovered.size*1.4;
      v.project(camera);
      const sx=(v.x*.5+.5)*innerWidth, sy=(-v.y*.5+.5)*innerHeight;
      label.style.left=sx+'px'; label.style.top=sy+'px'; label.classList.add('show');
    } else label.classList.remove('show');
  }
  function clearHover(){ if(hovered){ gsap.to(hovered._group.scale,{x:1,y:1,z:1,duration:.3}); }
    hovered=null; label.classList.remove('show'); cRing.classList.remove('hot'); }

  /* =====================================================================
     ENTER / LEAVE WORLDS  (cinematic camera)
     ===================================================================== */
  function handleClick(){ if(state.current||state.transition) return; if(hovered) enterWorld(hovered); }

  function enterWorld(w){
    if(state.transition) return; state.transition=true; state.current=w;
    setAccent(w.color); clearHover(); hideHint();
    document.getElementById('homeBtn').style.display='grid';
    const pPos=w._group.getWorldPosition(new THREE.Vector3());
    const dir3=new THREE.Vector3().subVectors(camera.position,pPos).normalize();
    const viewPos=pPos.clone().add(dir3.multiplyScalar(w.size*(portrait?5.6:4.2))).add(new THREE.Vector3(0,w.size*.6,0));
    autoRotate=0;
    gsap.to(camBase,{x:viewPos.x,y:viewPos.y,z:viewPos.z,duration:1.7,ease:'power3.inOut'});
    gsap.to(camLook,{x:pPos.x,y:pPos.y,z:pPos.z,duration:1.7,ease:'power3.inOut',
      onComplete:()=>{ state.transition=false; openPanel(w); }});
    // emphasize the chosen world, dim others
    WORLDS.forEach(o=>{ const t=o===w; gsap.to(o._mat,{emissiveIntensity:t?1.3:.25,duration:1});
      gsap.to(o._halo.material,{opacity:t?1:.15,duration:1}); });
    markExplored(w);
  }
  function goHome(){
    if(state.transition) return; closePanel();
    state.transition=true;
    document.getElementById('homeBtn').style.display='none';
    gsap.to(camBase,{x:HOME.pos.x,y:HOME.pos.y,z:HOME.pos.z,duration:1.5,ease:'power3.inOut'});
    gsap.to(camLook,{x:0,y:0,z:0,duration:1.5,ease:'power3.inOut',
      onComplete:()=>{ state.transition=false; state.current=null; autoRotate=.0006; showHint(); }});
    WORLDS.forEach(o=>{ gsap.to(o._mat,{emissiveIntensity:.9,duration:1});
      gsap.to(o._halo.material,{opacity:.85,duration:1}); });
  }
  document.getElementById('homeBtn').onclick=goHome;

  /* =====================================================================
     SECTION PANELS
     ===================================================================== */
  const panel=document.getElementById('panel'), sheet=document.getElementById('sheet'),
        body=document.getElementById('sheetBody');
  document.getElementById('closeBtn').onclick=goHome;
  document.getElementById('scrim').onclick=goHome;

  function openPanel(w){ body.innerHTML=render(w.id); panel.classList.add('open'); sheet.scrollTop=0;
    if(w.id==='skills') requestAnimationFrame(()=>requestAnimationFrame(fillSkillBars));
    if(w.id==='contact') wireContact();
    if(w.id==='certs') wireCerts();
  }
  function closePanel(){ panel.classList.remove('open'); }

  function render(id){
    if(id==='about') return `
      <div class="eyebrow">// identity</div><h2>About Me</h2>
      <p class="lede">A QA Engineer who makes sure software doesn't just work — it works <em>right</em>. I architect end-to-end test automation and hunt bugs before users ever see them.</p>
      <div class="cards">
        <div class="card"><div class="k">Bio</div><div class="v">Software Engineering undergraduate at IIT (University of Westminster), interning as a QA Engineer at Virtusa.</div></div>
        <div class="card"><div class="k">Focus</div><div class="v">Manual & automation testing, API validation, and database integrity.</div></div>
        <div class="card"><div class="k">Signature work</div><div class="v">Built a complete Playwright framework from scratch for 2 enterprise portals — smoke, sanity & regression.</div></div>
        <div class="card"><div class="k">Location</div><div class="v">Sri Lanka 🌏 — open to remote / async QA roles.</div></div>
        <div class="card" style="grid-column:1/-1"><div class="k">Toolkit</div>
          <div class="chips">${['Playwright','Selenium','TestNG','Postman','SoapUI','Oracle SQL','Java','API Testing','DB Testing'].map(t=>`<span class="chip">${t}</span>`).join('')}</div></div>
      </div>
      <div class="statrow">
        <div class="statbox"><b>2+</b><span>Portals automated</span></div>
        <div class="statbox"><b>8+</b><span>QA tools mastered</span></div>
        <div class="statbox"><b>100+</b><span>Test cases written</span></div>
      </div>`;
    if(id==='skills') return `
      <div class="eyebrow">// expertise</div><h2>Tools of My Trade</h2>
      <p class="lede">My QA and engineering toolkit, grouped by what I reach for it.</p>
      ${SKILLS.map(grp=>`
        <div class="skillgroup">
          <div class="sg-title">${grp.cat}</div>
          <div class="skillgrid">${grp.items.map(s=>`
            <div class="skill"><div class="top"><span class="nm">${s.n}</span><span class="yr">${s.p}</span></div>
            <div class="track"><div class="fill" data-l="${PROF[s.p]}"></div></div></div>`).join('')}</div>
        </div>`).join('')}`;
    if(id==='projects') return `
      <div class="eyebrow">// work</div><h2>Things I've Built</h2>
      <p class="lede">A few things I've designed, built and shipped.</p>
      ${PROJECTS.map(p=>`<div class="proj"><h3>${p.t} <em>${p.tag}</em></h3><p>${p.d}</p>
        <ul class="feat">${p.feat.map(f=>`<li>${f}</li>`).join('')}</ul>
        <div class="chips">${p.stack.map(s=>`<span class="chip">${s}</span>`).join('')}</div>
        <div class="links">
          ${p.demo?`<a class="btn" href="${p.demo}" target="_blank" rel="noopener">Live site</a>`:''}
          <a class="btn ghost" href="${p.gh}" target="_blank" rel="noopener">GitHub</a></div></div>`).join('')}`;
    if(id==='experience') return `
      <div class="eyebrow">// career & education</div><h2>Where I've Been</h2>
      <p class="lede">Career and study so far — energy nodes along the way.</p>
      <div class="tl">${EXPERIENCE.map(e=>`<div class="node">
        <div class="when">${e.when}</div>
        <div class="what">${e.what}${e.live?' <span class="livebadge">● Active</span>':''}</div>
        <div class="who">${e.who}</div>
        ${e.desc?`<div class="desc">${e.desc}</div>`:''}
        ${e.bullets?`<ul class="explist">${e.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>`:''}
        ${e.tools?`<div class="chips">${e.tools.map(t=>`<span class="chip">${t}</span>`).join('')}</div>`:''}
        </div>`).join('')}</div>`;
    if(id==='certs') return `
      <div class="eyebrow">// credentials</div><h2>Licenses & Certifications</h2>
      <p class="lede">${isTouch?'Tap':'Hover'} a card to flip it.</p>
      <div class="certs">${CERTS.map(c=>`<div class="flip"><div class="inner">
        <div class="face front"><div class="org">${c.org}</div><div class="ttl">${c.t}</div></div>
        <div class="face back"><div class="ttl">${c.t}</div><p>${c.d||''}</p>
          ${c.link?`<a class="btn ghost" href="${c.link}" target="_blank" rel="noopener" style="align-self:flex-start;margin-top:4px">View credential ↗</a>`:''}
        </div></div></div>`).join('')}</div>`;
    if(id==='contact') return `
      <div class="eyebrow">// get in touch</div><h2>Let's Connect</h2>
      <p class="lede">Looking for a QA Engineer who catches bugs before your users do? Let's talk.</p>
      <div class="console-ui">
        <div class="line"><b>›</b> channel open. transmit your message below.</div>
        <div class="commgrid">
          <a class="btn" href="${LINKS.github}" target="_blank" rel="noopener">GitHub</a>
          <a class="btn" href="${LINKS.linkedin}" target="_blank" rel="noopener">LinkedIn</a>
          <a class="btn" href="${LINKS.email}">Email</a>
          <a class="btn ghost" href="${LINKS.resume}" download>Résumé</a>
        </div>
        <div class="field"><textarea id="msg" placeholder="// type your transmission..."></textarea></div>
        <div style="text-align:right;margin-top:10px"><button class="btn" id="sendBtn">Transmit ▸</button></div>
        <div class="sent" id="sent">▸ transmission received. Reach me directly at gayathmimohottige@gmail.com</div>
      </div>`;
    return '';
  }
  function fillSkillBars(){ document.querySelectorAll('.fill').forEach(f=>{ f.style.width=(f.dataset.l*100)+'%'; }); }
  function wireCerts(){ document.querySelectorAll('.flip').forEach(f=>{
    f.addEventListener('click',e=>{ if(e.target.closest('a')) return; f.classList.toggle('flipped'); }); }); }
  function wireContact(){
    const b=document.getElementById('sendBtn'); if(!b) return;
    b.onclick=()=>{ const s=document.getElementById('sent'); s.classList.add('show');
      energyPulse(); award('contact','📡','Transmission','message sent into the void'); };
  }
  function energyPulse(){
    const cx=innerWidth/2, cy=innerHeight/2;
    const ring=document.createElement('div'); ring.className='ripple';
    ring.style.left=cx+'px'; ring.style.top=cy+'px'; ring.style.width=ring.style.height='10px';
    document.body.appendChild(ring);
    gsap.to(ring,{width:innerWidth,height:innerWidth,opacity:0,duration:1.1,ease:'power2.out',onComplete:()=>ring.remove()});
    for(let i=0;i<26;i++){ const p=document.createElement('div'); p.className='ripple';
      p.style.left=cx+'px'; p.style.top=cy+'px'; p.style.width=p.style.height='6px';
      p.style.background='var(--accent)'; p.style.border='none'; document.body.appendChild(p);
      const a=Math.random()*TAU, d=rand(90,300);
      gsap.to(p,{left:(cx+Math.cos(a)*d)+'px',top:(cy+Math.sin(a)*d)+'px',opacity:0,
        duration:rand(.6,1.2),ease:'power2.out',onComplete:()=>p.remove()}); }
  }

  /* =====================================================================
     ACHIEVEMENTS
     ===================================================================== */
  const explored=new Set(), unlocked=new Set();
  const toasts=document.getElementById('toasts');
  function award(key,ico,title,sub){ if(unlocked.has(key)) return; unlocked.add(key);
    const el=document.createElement('div'); el.className='toast';
    el.innerHTML=`<span class="ico">${ico}</span><div><div class="tt">${title}</div><div class="ts">${sub}</div></div>`;
    toasts.appendChild(el); requestAnimationFrame(()=>el.classList.add('in'));
    setTimeout(()=>{ el.classList.remove('in'); setTimeout(()=>el.remove(),450); },3400);
  }
  const FIRST={projects:['🚀','Project Hunter','you found the build hall'],
    skills:['⚡','Skill Master','the galaxy responds'],
    experience:['⏳','Time Traveler','walking the timeline'],
    certs:['🎖','Certified','proof acquired'],about:['🛰','Explorer','first world reached']};
  function markExplored(w){ const first=explored.size===0;
    explored.add(w.id); document.getElementById('exploredCount').textContent=explored.size;
    if(first) award('explorer','🛰','Explorer','first world reached');
    const f=FIRST[w.id]; if(f && w.id!=='about') award(w.id,f[0],f[1],f[2]);
    if(explored.size>=WORLDS.length) award('master','🌌','Universe Mastered','every world explored');
  }

  /* =====================================================================
     HINT
     ===================================================================== */
  const hint=document.getElementById('hint');
  hint.textContent = isTouch ? 'Tap a world to enter · or use the menu below' : 'Drag to look around · Click a world to enter';
  function hideHint(){ hint.classList.add('fade'); }
  function showHint(){ hint.classList.remove('fade'); }

  /* =====================================================================
     NAV DOTS
     ===================================================================== */
  const navDots=document.getElementById('navDots');
  WORLDS.forEach(w=>{ const d=document.createElement('div'); d.className='dot';
    d.style.color=HEX(w.color); d.innerHTML=`<span>${w.name}</span><i></i>`;
    d.onclick=()=>{ if(state.transition||state.current===w) return;
      if(state.current){ goHome(); setTimeout(()=>enterWorld(w),1650); } else enterWorld(w); };
    navDots.appendChild(d); });
  document.getElementById('worldCount').textContent=WORLDS.length;

  /* =====================================================================
     DAY / NIGHT
     ===================================================================== */
  let isDay=false; const dayBtn=document.getElementById('dayBtn');
  dayBtn.onclick=()=>{ isDay=!isDay; document.body.classList.toggle('day',isDay);
    dayBtn.textContent=isDay?'☾':'☀'; dayBtn.classList.toggle('on',isDay);
    gsap.to(amb,{intensity:isDay?1.7:.9,duration:1});
    gsap.to(key,{intensity:isDay?1.8:1.1,duration:1});
    gsap.to(state.stars.material,{opacity:isDay?.25:1,duration:1});
    state.nebula.forEach(n=>gsap.to(n.material,{opacity:isDay?.07:.16,duration:1}));
    const fc=new THREE.Color(isDay?0x9bb6ef:0x05060f); gsap.to(scene.fog.color,{r:fc.r,g:fc.g,b:fc.b,duration:1});
  };

  /* =====================================================================
     AMBIENT SOUND  (warm pad + gentle starlight twinkles)
     ===================================================================== */
  let audioCtx=null,master=null,soundOn=false,twinkleTimer=null;
  const soundBtn=document.getElementById('soundBtn');
  function buildAudio(){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    master=audioCtx.createGain(); master.gain.value=0; master.connect(audioCtx.destination);
    // soft echo/space tail
    const delay=audioCtx.createDelay(1.5); delay.delayTime.value=.42;
    const fb=audioCtx.createGain(); fb.gain.value=.34; delay.connect(fb); fb.connect(delay);
    const wet=audioCtx.createGain(); wet.gain.value=.45; delay.connect(wet); wet.connect(master);
    // warm pad — D major (D3 A3 D4 F#4)
    const pad=audioCtx.createBiquadFilter(); pad.type='lowpass'; pad.frequency.value=820; pad.Q.value=.4;
    pad.connect(master); pad.connect(delay);
    [146.83,220.00,293.66,369.99].forEach((f,i)=>{
      const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=f; o.detune.value=rand(-4,4);
      const g=audioCtx.createGain(); g.gain.value=.10/(i*.35+1); o.connect(g); g.connect(pad); o.start();
      // gentle vibrato
      const v=audioCtx.createOscillator(); v.frequency.value=rand(.08,.18); const vg=audioCtx.createGain();
      vg.gain.value=2.5; v.connect(vg); vg.connect(o.detune); v.start();
    });
    // slow filter breathing
    const lfo=audioCtx.createOscillator(); lfo.frequency.value=.045; const lg=audioCtx.createGain();
    lg.gain.value=340; lfo.connect(lg); lg.connect(pad.frequency); lfo.start();
    // starlight twinkles — D major pentatonic bells
    const bells=[587.33,659.25,783.99,880.00,1046.50,1174.66];
    twinkleTimer=setInterval(()=>{ if(!soundOn||audioCtx.state!=='running') return;
      if(Math.random()<.35) return;
      const f=bells[Math.random()*bells.length|0];
      const o=audioCtx.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=audioCtx.createGain(); g.gain.value=0; o.connect(g); g.connect(delay); g.connect(master);
      const t=audioCtx.currentTime; o.start(t);
      g.gain.linearRampToValueAtTime(.07, t+.02);
      g.gain.exponentialRampToValueAtTime(.0001, t+1.7); o.stop(t+1.9);
    }, 2400);
  }
  soundBtn.onclick=()=>{ if(!audioCtx) buildAudio(); if(audioCtx.state==='suspended') audioCtx.resume();
    soundOn=!soundOn; soundBtn.classList.toggle('on',soundOn);
    master.gain.cancelScheduledValues(audioCtx.currentTime);
    master.gain.linearRampToValueAtTime(soundOn?.42:0, audioCtx.currentTime+1.4); };

  /* =====================================================================
     KONAMI  →  DEVELOPER MODE
     ===================================================================== */
  const KONAMI=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let kPos=0, devMode=false;
  addEventListener('keydown',e=>{
    const k=e.key.length===1?e.key.toLowerCase():e.key;
    kPos = (k===KONAMI[kPos]) ? kPos+1 : (k===KONAMI[0]?1:0);
    if(kPos===KONAMI.length){ kPos=0; toggleDev(); }
    if(e.key==='Escape' && state.current) goHome();
  });
  function toggleDev(){ devMode=!devMode;
    document.getElementById('fps').classList.toggle('show',devMode);
    document.getElementById('devbadge').classList.toggle('show',devMode);
    document.getElementById('matrix').classList.toggle('on',devMode);
    WORLDS.forEach(w=>{ w._mat.wireframe=devMode; });
    if(devMode){ award('dev','◈','Developer','wireframe reality unlocked'); matrixOn(); }
  }

  // matrix rain
  const mcanvas=document.getElementById('matrix'),mctx=mcanvas.getContext('2d');
  let mCols=[],mRAF=null;
  function matrixResize(){ mcanvas.width=innerWidth; mcanvas.height=innerHeight;
    const cols=Math.floor(innerWidth/16); mCols=Array(cols).fill(0).map(()=>Math.random()*innerHeight); }
  function matrixDraw(){ if(!devMode){ mRAF=null; return; }
    mctx.fillStyle='rgba(5,6,15,.08)'; mctx.fillRect(0,0,mcanvas.width,mcanvas.height);
    mctx.fillStyle='#46f0b0'; mctx.font='14px Space Mono, monospace';
    mCols.forEach((y,i)=>{ const ch=String.fromCharCode(0x30A0+Math.random()*96|0);
      mctx.fillText(ch,i*16,y); mCols[i]= y>innerHeight && Math.random()>.975 ? 0 : y+16; });
    mRAF=requestAnimationFrame(matrixDraw); }
  function matrixOn(){ matrixResize(); if(!mRAF) matrixDraw(); }

  /* =====================================================================
     SHOOTING STARS
     ===================================================================== */
  let nextShoot=2;
  function spawnShoot(){
    const m=new THREE.SpriteMaterial({map:glowTex,color:0xffffff,transparent:true,opacity:1,
      depthWrite:false,blending:THREE.AdditiveBlending});
    const sp=new THREE.Sprite(m); const sx=rand(-50,50),sy=rand(10,40);
    sp.position.set(sx,sy,rand(-40,-10)); sp.scale.set(.1,.1,1); scene.add(sp);
    gsap.to(sp.scale,{x:6,y:.5,duration:.3});
    gsap.to(sp.position,{x:sx-rand(30,55),y:sy-rand(15,30),duration:1.1,ease:'power2.in'});
    gsap.to(m,{opacity:0,duration:1.1,ease:'power2.in',onComplete:()=>scene.remove(sp)});
  }

  /* =====================================================================
     STATE + ANIMATION LOOP
     ===================================================================== */

  /* =====================================================================
     RESIZE
     ===================================================================== */
  addEventListener('resize',()=>{
    frameCamera();
    renderer.setSize(innerWidth,innerHeight);
    if(!state.current && !state.transition) camBase.set(HOME.pos.x,HOME.pos.y,HOME.pos.z);
    if(devMode) matrixResize();
  });

  /* =====================================================================
     MAIN LOOP
     ===================================================================== */
  const clock=new THREE.Clock();
  const camCoord=document.getElementById('camCoord');
  let fpsT=0,frames=0,coordT=0;
  function animate(){
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),.05), t=clock.elapsedTime;

    // universe auto + drag rotation
    dragYaw=lerp(dragYaw,tgtYaw,.06); dragPitch=lerp(dragPitch,tgtPitch,.06);
    if(!state.current && !state.transition) tgtYaw+=autoRotate;
    universe.rotation.y=dragYaw; universe.rotation.x=dragPitch;

    // planets alive
    WORLDS.forEach(w=>{ const g=w._group;
      w._core.rotation.y+=dt*.25;
      g.position.y = w.pos[1] + Math.sin(t*.6+g.userData.bob)*.18;
      if(g.userData.ring) g.userData.ring.rotation.y+=dt*.5;
      w._halo.material.rotation+=dt*.1;
    });

    // nebula drift
    state.nebula.forEach(n=>{ n.material.rotation+=n.userData.spin*dt; });
    state.stars.rotation.y+=dt*.005;

    // camera: base + smoothed parallax, look at target
    parallax.lerp(parallaxTarget,.05);
    camera.position.set(camBase.x+parallax.x, camBase.y+parallax.y, camBase.z);
    camera.lookAt(camLook);

    updateHover();

    // shooting stars
    nextShoot-=dt; if(nextShoot<=0 && !reduceMotion){ spawnShoot(); nextShoot=rand(4,9); }

    // console readout
    coordT+=dt; if(coordT>.1){ coordT=0;
      camCoord.textContent=camera.position.x.toFixed(1)+', '+camera.position.y.toFixed(1)+', '+camera.position.z.toFixed(1); }

    renderer.render(scene,camera);

    // fps (dev)
    frames++; fpsT+=dt;
    if(devMode && fpsT>=.5){ document.getElementById('fpsVal').textContent=Math.round(frames/fpsT);
      document.getElementById('objVal').textContent=scene.children.length+universe.children.length;
      document.getElementById('triVal').textContent=renderer.info.render.triangles;
      frames=0; fpsT=0; }
    else if(fpsT>=.5){ frames=0; fpsT=0; }
  }

  /* =====================================================================
     STATE OBJECT  (must exist before scene builders ran — hoisting)
     ===================================================================== */
  // NOTE: builders above referenced `state`; we attach via a real object here
  // and re-run nothing because builders only *stored into* state after this.
  // (Defined as a function-scoped object via var hoisting workaround below.)

  /* =====================================================================
     INTRO + LOADER
     ===================================================================== */
  function startIntro(){
    autoRotate=.0006;
    gsap.to(camBase,{x:HOME.pos.x,y:HOME.pos.y,z:HOME.pos.z,duration:3.2,ease:'power2.out'});
    gsap.fromTo(state.stars.rotation,{y:-.4},{y:0,duration:4,ease:'power1.out'});
  }
  function runLoader(){
    let p=0; const fill=document.getElementById('barFill'),txt=document.getElementById('pctTxt'),
      boot=document.getElementById('bootLine');
    const MSGS=[
      '› initializing flight systems…',
      '› loading test environment <b>✓</b>',
      '› spinning up Playwright runner <b>✓</b>',
      '› regression suite: 0 bugs escaped <b>✓</b>',
      '› calibrating star map <b>✓</b>',
      "› entering Gayathmi's universe…",
    ];
    const iv=setInterval(()=>{ p=Math.min(100,p+rand(5,13));
      fill.style.width=p+'%'; txt.textContent=Math.round(p)+'%';
      const idx=Math.min(MSGS.length-1, Math.floor(p/100*MSGS.length));
      boot.innerHTML=MSGS[idx];
      if(p>=100){ clearInterval(iv);
        setTimeout(()=>{ document.getElementById('loader').classList.add('hide'); startIntro(); },450); }
    },150);
  }

  animate();
  runLoader();
  })();
  </script>
